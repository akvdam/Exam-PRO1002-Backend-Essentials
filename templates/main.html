{% extends 'layout.html' %}
{% block content %}
<h2>Siste oppdateringer fra kvalifiseringen</h2>

<div class="posts-list">
    {% for post in posts %}
    <article class="post-summary">
        <h3><a href="/posts/{{ post.id }}">{{ post.title }}</a></h3>
        <p class="meta-date"><em>Publisert: {{ post.publication_date }}</em></p>
        
        <p class="excerpt">{{ post.excerpt }}...</p>
        
        <p class="post-tags">
            <strong>Tagger:</strong>
            {% for tag in post.tags %}
                <a href="/tags/{{ tag }}" class="tag-link">#{{ tag }}</a>
            {% endfor %}
        </p>
        <hr>
    </article>
    {% endfor %}
</div>
{% endblock %}
